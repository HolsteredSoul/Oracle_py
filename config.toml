[llm]
# Update model IDs here as new models are released — never hardcode in source
fast_model = "google/gemini-2.5-flash-lite"
deep_model = "anthropic/claude-sonnet-4.6"
daily_cap_usd = 5.0
downgrade_threshold_pct = 0.80
use_structured_output = true

[triggers]
news_sentiment_delta = 0.28
x_momentum = 0.32
volatility_z = 2.3
margin_min_paper = 0.030
margin_min_live = 0.015

[risk]
max_exposure = 0.85
drawdown_throttle_pct = 0.20
drawdown_throttle_factor = 0.50
confidence_floor = 35
commission_pct = 0.05
beta = 2.00
liquidity_safety_factor = 0.70
kelly_base_fraction = 0.50

[scanner]
poll_interval_sec = 1800
manifold_min_volume = 500
manifold_min_prob_range = [0.05, 0.95]
betfair_event_types = [1, 2, 4, 61, 7522, 7524, 7511]
betfair_country_codes = ["AU", "GB", "DE", "ES", "IT", "FR", "NL", "PT"]
betfair_hours_ahead = 72

[stats]
football_api = "football-data"
football_api_base = "https://api.football-data.org/v4"
afl_api_base = "https://api.squiggle.com.au"
cache_ttl_hours = 6
min_data_completeness = 0.5

[betfair]
# Phase 4 only — leave empty during paper trading
api_key = ""
session_token = ""
min_bet_aud = 2.00
synthetic_tif_sec = 300
