[llm]
# Update model IDs here as new models are released — never hardcode in source
fast_model = "google/gemini-2.5-flash-lite"
deep_model = "anthropic/claude-sonnet-4.6"
perplexity_model = "perplexity/sonar"
daily_cap_usd = 5.0
downgrade_threshold_pct = 0.80
use_structured_output = true

[triggers]
news_sentiment_delta = 0.15
volatility_z = 2.3
margin_min_paper = 0.020
margin_min_live = 0.015

[risk]
max_exposure = 0.85
drawdown_throttle_pct = 0.25
drawdown_throttle_factor = 0.50
confidence_floor = 35
commission_pct = 0.05
beta = 2.00
liquidity_safety_factor = 0.70
kelly_base_fraction = 0.75
kelly_hard_cap = 0.20
lay_max_pnl_pct = 0.15
paper_max_cost_aud = 200.0
# Realism parameters
min_market_liquidity_aud = 50.0
min_matched_volume_aud = 500.0
max_lay_probability = 0.90
slippage_model = "linear"
slippage_factor = 0.10
# In-play safety gate — reject trades on in-play markets
allow_in_play = false
# Crossed-book detection — skip if best_back < best_lay (stale/suspended data)
reject_crossed_book = true

[scanner]
poll_interval_sec = 1800
prob_range = [0.05, 0.95]
betfair_event_types = [1, 2, 4, 61, 7522, 7524, 7511]
betfair_country_codes = ["AU", "GB", "DE", "ES", "IT", "FR", "NL", "PT"]
betfair_hours_ahead = 72
betfair_max_market_age_hours = 168
# Adaptive scheduling — interval adjusts based on market density
max_markets_per_cycle = 25
min_interval_min = 10          # floor: never faster than 10 min
max_interval_min = 45          # ceiling: never slower than 45 min
rejection_cache_ttl_min = 120  # skip markets that failed hard gates for 2h

[stats]
football_api = "football-data"
football_api_base = "https://api.football-data.org/v4"
afl_api_base = "https://api.squiggle.com.au"
basketball_api_base = "https://v1.basketball.api-sports.io"
mlb_api_base = "https://statsapi.mlb.com/api/v1"
cache_ttl_hours = 6
min_data_completeness = 0.5

[paper]
# Queue-position model: simulates order queue friction in _depth_fill()
# "none" = fill all displayed volume (optimistic)
# "linear" = discount each level linearly by your share
# "probabilistic" = Bernoulli draw per level (most realistic)
queue_position_model = "probabilistic"
queue_factor = 0.50          # hidden queue depth as fraction of visible volume

# Post-fill adverse drift (disabled by default — risk of double-counting with slippage)
adverse_drift_enabled = false
adverse_drift_base_sigma = 0.003

# Realism tracking
track_fill_rates = true      # log filled_fraction for calibration

[betfair]
# Phase 4 only — leave empty during paper trading
api_key = ""
session_token = ""
min_bet_aud = 2.00
synthetic_tif_sec = 300
